<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Demographics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Add some styling */
        .required:after {
            content: " *";
            color: red;
        }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/patient/dashboard}">
            <i class="bi bi-heart-pulse me-1"></i>iChat
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/patient/dashboard}">
                        <i class="bi bi-house-door me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/patient/appointment/new}">
                        <i class="bi bi-calendar-plus me-1"></i>Book Appointment
                    </a>
                </li>
                <!-- Community in Primary Nav -->
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/community}">
                        <i class="bi bi-people-fill me-1"></i>Community
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <!-- Profile Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="profileDropdown" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle me-1"></i>
                        <span th:text="${user.firstname}"></span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
                        <li class="dropdown-header">Health Profile</li>
                        <li><a class="dropdown-item" th:href="@{/patient/profile/demographics}"><i class="bi bi-person-vcard me-2"></i>Demographics</a></li>
                        <li><a class="dropdown-item" th:href="@{/patient/profile/medical-history}"><i class="bi bi-clipboard2-pulse me-2"></i>Medical History</a></li>
                        <li><a class="dropdown-item" th:href="@{/patient/profile/view}"><i class="bi bi-eye me-2"></i>View Profile</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Demographic Information</h4>
                </div>
                <div class="card-body">
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/patient/profile/demographics}" method="post" th:object="${demographics}">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="dateOfBirth" class="form-label required">Date of Birth</label>
                                <!-- Use a separate input field with proper binding -->
                                <input type="date" class="form-control" id="dateOfBirth"
                                       name="dateOfBirth"
                                       th:value="${demographics.dateOfBirth != null ? demographics.dateOfBirth.toString() : ''}"
                                       max="[[${#dates.format(#dates.createToday(), 'yyyy-MM-dd')}]]"
                                       required>
                                <small hidden class="text-muted">Date cannot be in the future</small>
                                <!-- Keep a hidden field for proper binding with Thymeleaf -->
                                <input type="hidden" th:field="*{dateOfBirth}">
                            </div>
                            <div class="col-md-6">
                                <label for="gender" class="form-label">Gender</label>
                                <select class="form-select" id="gender" th:field="*{gender}">
                                    <option value="">Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Non-binary">Non-binary</option>
                                    <option value="Other">Other</option>
                                    <option value="Prefer not to say">Prefer not to say</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="address" class="form-label">Address</label>
                            <input type="text" class="form-control" id="address" th:field="*{address}" placeholder="Street address">
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="city" class="form-label">City</label>
                                <input type="text" class="form-control" id="city" th:field="*{city}">
                            </div>
                            <div class="col-md-4">
                                <label for="state" class="form-label">State</label>
                                <input type="text" class="form-control" id="state" th:field="*{state}">
                            </div>
                            <div class="col-md-4">
                                <label for="zipCode" class="form-label">ZIP Code</label>
                                <input type="text" class="form-control" id="zipCode" th:field="*{zipCode}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="phoneNumber" class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="phoneNumber" th:field="*{phoneNumber}">
                        </div>

                        <div class="mb-3">
                            <label for="ethnicity" class="form-label">Ethnicity</label>
                            <select class="form-select" id="ethnicity" th:field="*{ethnicity}">
                                <option value="">Select Ethnicity</option>
                                <option value="White">White</option>
                                <option value="Black or African American">Black or African American</option>
                                <option value="Hispanic or Latino">Hispanic or Latino</option>
                                <option value="Asian">Asian</option>
                                <option value="Native American">Native American</option>
                                <option value="Pacific Islander">Pacific Islander</option>
                                <option value="Other">Other</option>
                                <option value="Prefer not to say">Prefer not to say</option>
                            </select>
                        </div>

                        <h5 class="mt-4 mb-3">Emergency Contact</h5>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="emergencyContactName" class="form-label">Name</label>
                                <input type="text" class="form-control" id="emergencyContactName" th:field="*{emergencyContactName}">
                            </div>
                            <div class="col-md-6">
                                <label for="emergencyContactPhone" class="form-label">Phone</label>
                                <input type="tel" class="form-control" id="emergencyContactPhone" th:field="*{emergencyContactPhone}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="emergencyContactRelationship" class="form-label">Relationship</label>
                            <input type="text" class="form-control" id="emergencyContactRelationship" th:field="*{emergencyContactRelationship}" placeholder="e.g., Spouse, Parent, Friend">
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a th:href="@{/patient/dashboard}" class="btn btn-secondary me-md-2">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Demographics</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add JavaScript to enforce date validation -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const dobInput = document.getElementById('dateOfBirth');
        const today = new Date().toISOString().split('T')[0];

        // Set max date to today
        dobInput.max = today;

        // Add event listener to prevent future dates
        dobInput.addEventListener('input', function() {
            const selectedDate = new Date(this.value);
            const today = new Date();
            today.setHours(0, 0, 0, 0); // Set to beginning of day

            if (selectedDate > today) {
                alert('Date of birth cannot be in the future.');
                this.value = '';
            }
        });

        // Copy value to hidden field on change
        dobInput.addEventListener('change', function() {
            const hiddenField = this.parentElement.querySelector('input[type="hidden"]');
            if (hiddenField) {
                hiddenField.value = this.value;
            }
        });
    });
</script>
</body>
</html>
