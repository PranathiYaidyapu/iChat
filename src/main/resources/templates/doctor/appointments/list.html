<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Doctor Appointments</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    .appointment-card {
      transition: transform 0.2s;
      border-left: 4px solid #0d6efd;
    }
    .appointment-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .todays-appointment {
      border-left-color: #198754;
      background-color: #f8fff9;
    }
    .past-appointment {
      border-left-color: #6c757d;
      opacity: 0.8;
    }
    .status-badge {
      font-size: 0.8em;
      padding: 0.25em 0.6em;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">Doctor Dashboard</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link text-light" th:href="@{/doctor/dashboard}">
            <i class="bi bi-house"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="btn btn-danger" href="/logout">Logout</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>My Appointments</h2>
    <div>
      <a th:href="@{/doctor/appointments/search}" class="btn btn-outline-primary me-2">
        <i class="bi bi-search"></i> Search
      </a>
      <a th:href="@{/doctor/dashboard}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
      </a>
    </div>
  </div>

  <!-- Today's Appointments -->
  <div class="card mb-4">
    <div class="card-header bg-success text-white">
      <h5 class="mb-0"><i class="bi bi-calendar-check"></i> Today's Appointments
        <span class="badge bg-light text-dark" th:text="${#lists.size(todaysAppointments)}"></span>
      </h5>
    </div>
    <div class="card-body">
      <div th:if="${#lists.isEmpty(todaysAppointments)}" class="text-center text-muted py-4">
        <i class="bi bi-calendar-x display-6"></i>
        <p class="mt-3">No appointments scheduled for today</p>
      </div>
      <div th:each="appointment : ${todaysAppointments}" class="mb-3">
        <div class="card appointment-card todays-appointment">
          <div class="card-body">
            <div class="row">
              <div class="col-md-8">
                <h6 class="card-title">
                  <i class="bi bi-person-circle"></i>
                  <span th:text="${appointment.patient.firstname + ' ' + appointment.patient.lastName}"></span>
                </h6>
                <p class="card-text mb-1">
                  <i class="bi bi-clock"></i>
                  <span th:text="${#temporals.format(appointment.startTime, 'hh:mm a') + ' - ' + #temporals.format(appointment.endTime, 'hh:mm a')}"></span>
                </p>
                <p class="card-text text-muted mb-1" th:if="${appointment.reason}">
                  <i class="bi bi-chat-text"></i> <span th:text="${appointment.reason}"></span>
                </p>
              </div>
              <div class="col-md-4 text-end">
                <span class="badge bg-success status-badge" th:text="${appointment.status}"></span>
                <div class="mt-2">
                  <a th:href="@{/doctor/appointments/{id}(id=${appointment.id})}"
                     class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-eye"></i> View Details
                  </a>
                  <form th:action="@{/doctor/appointments/{id}/complete(id=${appointment.id})}"
                        method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-success">
                      <i class="bi bi-check-circle"></i> Complete
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Upcoming Appointments -->
  <div class="card mb-4">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0"><i class="bi bi-calendar-week"></i> Upcoming Appointments
        <span class="badge bg-light text-dark" th:text="${#lists.size(upcomingAppointments)}"></span>
      </h5>
    </div>
    <div class="card-body">
      <div th:if="${#lists.isEmpty(upcomingAppointments)}" class="text-center text-muted py-4">
        <i class="bi bi-calendar-x display-6"></i>
        <p class="mt-3">No upcoming appointments</p>
      </div>
      <div th:each="appointment : ${upcomingAppointments}" class="mb-3">
        <div class="card appointment-card">
          <div class="card-body">
            <div class="row">
              <div class="col-md-8">
                <h6 class="card-title">
                  <i class="bi bi-person-circle"></i>
                  <span th:text="${appointment.patient.firstname + ' ' + appointment.patient.lastName}"></span>
                </h6>
                <p class="card-text mb-1">
                  <i class="bi bi-calendar"></i>
                  <span th:text="${#temporals.format(appointment.startTime, 'EEE, MMM dd, yyyy')}"></span>
                </p>
                <p class="card-text mb-1">
                  <i class="bi bi-clock"></i>
                  <span th:text="${#temporals.format(appointment.startTime, 'hh:mm a') + ' - ' + #temporals.format(appointment.endTime, 'hh:mm a')}"></span>
                </p>
                <p class="card-text text-muted mb-1" th:if="${appointment.reason}">
                  <i class="bi bi-chat-text"></i> <span th:text="${appointment.reason}"></span>
                </p>
              </div>
              <div class="col-md-4 text-end">
                <span class="badge bg-primary status-badge" th:text="${appointment.status}"></span>
                <div class="mt-2">
                  <a th:href="@{/doctor/appointments/{id}(id=${appointment.id})}"
                     class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-eye"></i> View Details
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Past Appointments -->
  <div class="card">
    <div class="card-header bg-secondary text-white">
      <h5 class="mb-0"><i class="bi bi-clock-history"></i> Past Appointments
        <span class="badge bg-light text-dark" th:text="${#lists.size(pastAppointments)}"></span>
      </h5>
    </div>
    <div class="card-body">
      <div th:if="${#lists.isEmpty(pastAppointments)}" class="text-center text-muted py-4">
        <i class="bi bi-calendar-x display-6"></i>
        <p class="mt-3">No past appointments</p>
      </div>
      <div th:each="appointment : ${pastAppointments}" class="mb-3">
        <div class="card appointment-card past-appointment">
          <div class="card-body">
            <div class="row">
              <div class="col-md-8">
                <h6 class="card-title">
                  <i class="bi bi-person-circle"></i>
                  <span th:text="${appointment.patient.firstname + ' ' + appointment.patient.lastName}"></span>
                </h6>
                <p class="card-text mb-1">
                  <i class="bi bi-calendar"></i>
                  <span th:text="${#temporals.format(appointment.startTime, 'EEE, MMM dd, yyyy')}"></span>
                </p>
                <p class="card-text mb-1">
                  <i class="bi bi-clock"></i>
                  <span th:text="${#temporals.format(appointment.startTime, 'hh:mm a') + ' - ' + #temporals.format(appointment.endTime, 'hh:mm a')}"></span>
                </p>
                <p class="card-text text-muted mb-1" th:if="${appointment.reason}">
                  <i class="bi bi-chat-text"></i> <span th:text="${appointment.reason}"></span>
                </p>
              </div>
              <div class="col-md-4 text-end">
                                <span th:classappend="${appointment.status == 'COMPLETED'} ? 'bg-success' : 'bg-danger'"
                                      class="badge status-badge" th:text="${appointment.status}"></span>
                <div class="mt-2">
                  <a th:href="@{/doctor/appointments/{id}(id=${appointment.id})}"
                     class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-eye"></i> View Details
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
