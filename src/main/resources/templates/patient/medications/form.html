<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${medication.id != null} ? 'Edit Medication' : 'Add Medication'"></title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">iChat</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/patient/dashboard}">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/patient/medications}">Medications</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="row">
    <div class="col-md-8 mx-auto">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0" th:text="${medication.id != null} ? 'Edit Medication' : 'Add New Medication'"></h4>
        </div>
        <div class="card-body">
          <form th:action="${medication.id != null} ?
                          @{/patient/medications/{id}(id=${medication.id})} :
                          @{/patient/medications}"
                method="post" th:object="${medication}">

            <div class="mb-3">
              <label for="medicationName" class="form-label">Medication Name *</label>
              <input type="text" class="form-control" id="medicationName"
                     th:field="*{medicationName}" required>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label for="dosage" class="form-label">Dosage *</label>
                <input type="text" class="form-control" id="dosage"
                       th:field="*{dosage}" placeholder="e.g., 10mg" required>
              </div>
              <div class="col-md-6">
                <label for="frequency" class="form-label">Frequency *</label>
                <select class="form-select" id="frequency" th:field="*{frequency}" required>
                  <option value="">Select Frequency</option>
                  <option value="Once daily">Once daily</option>
                  <option value="Twice daily">Twice daily</option>
                  <option value="Three times daily">Three times daily</option>
                  <option value="Four times daily">Four times daily</option>
                  <option value="As needed">As needed</option>
                  <option value="Weekly">Weekly</option>
                  <option value="Monthly">Monthly</option>
                </select>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label for="startDate" class="form-label">Start Date</label>
                <input type="date" class="form-control" id="startDate" th:field="*{startDate}">
              </div>
              <div class="col-md-6">
                <label for="endDate" class="form-label">End Date</label>
                <input type="date" class="form-control" id="endDate" th:field="*{endDate}">
              </div>
            </div>

            <div class="mb-3">
              <label for="instructions" class="form-label">Special Instructions</label>
              <textarea class="form-control" id="instructions" th:field="*{instructions}"
                        rows="3" placeholder="Any special instructions..."></textarea>
            </div>

            <div class="card mb-3">
              <div class="card-header">
                <h6 class="mb-0">Reminder Settings</h6>
              </div>
              <div class="card-body">
                <div class="form-check form-switch mb-3">
                  <input class="form-check-input" type="checkbox"
                         id="reminderEnabled" th:field="*{reminderEnabled}">
                  <label class="form-check-label" for="reminderEnabled">
                    Enable medication reminders
                  </label>
                </div>

                <div class="row" >
                  <div class="col-md-6">
                    <label for="reminderTime" class="form-label">Reminder Time</label>
                    <select id="reminderTime" class="form-select" th:field="*{reminderTime}">
                      <option value="">-- Select time --</option>
                      <option th:each="i : ${#numbers.sequence(0,47)}"
                              th:value="${T(java.time.LocalTime).ofSecondOfDay(i * 1800).toString()}"
                              th:text="${T(java.time.LocalTime).ofSecondOfDay(i * 1800).format(T(java.time.format.DateTimeFormatter).ofPattern('hh:mm a'))}">
                      </option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label for="reminderFrequency" class="form-label">Frequency</label>
                    <select class="form-select" id="reminderFrequency"
                            th:field="*{reminderFrequency}" >
                      <option value="DAILY">Daily</option>
                      <option value="WEEKLY">Weekly</option>
                      <option value="MONTHLY">Monthly</option>
                      <option value="AS_NEEDED">As Needed</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="active"
                     th:field="*{active}" checked>
              <label class="form-check-label" for="active">
                This medication is currently active
              </label>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
              <a th:href="@{/patient/medications}" class="btn btn-secondary me-md-2">Cancel</a>
              <button type="submit" class="btn btn-primary">
                <span th:text="${medication.id != null} ? 'Update' : 'Save'"></span> Medication
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
