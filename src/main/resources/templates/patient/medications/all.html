<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>All Medications</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">iChat</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/patient/dashboard}">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/patient/medications}">Medications</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/logout}">Logout</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>All Medications</h2>
    <div>
      <a th:href="@{/patient/medications/new}" class="btn btn-primary me-2">
        <i class="bi bi-plus-circle"></i> Add Medication
      </a>
      <a th:href="@{/patient/medications}" class="btn btn-outline-secondary">
        View Active Only
      </a>
    </div>
  </div>

  <div th:if="${medications != null and medications.empty}" class="alert alert-info">
    <h5>No Medications Found</h5>
    <p>You haven't added any medications yet. Click "Add Medication" to get started.</p>
  </div>

  <div th:if="${medications != null and !medications.empty}" class="row">
    <div class="col-12">
      <div class="table-responsive">
        <table class="table table-striped">
          <thead>
          <tr>
            <th>Medication</th>
            <th>Dosage</th>
            <th>Frequency</th>
            <th>Status</th>
            <th>Reminder</th>
            <th>Actions</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="med : ${medications}">
            <td th:text="${med.medicationName}"></td>
            <td th:text="${med.dosage}"></td>
            <td th:text="${med.frequency}"></td>
            <td>
              <span th:if="${med.active}" class="badge bg-success">Active</span>
              <span th:unless="${med.active}" class="badge bg-secondary">Inactive</span>
            </td>
            <td>
                                <span th:if="${med.reminderEnabled}" class="badge bg-warning">
                                    <i class="bi bi-bell"></i>
                                    <span th:if="${med.reminderTime != null}" th:text="${#temporals.format(med.reminderTime, 'HH:mm')}"></span>
                                </span>
              <span th:unless="${med.reminderEnabled}" class="badge bg-secondary">No Reminder</span>
            </td>
            <td>
              <div class="btn-group btn-group-sm" role="group">
                <a th:href="@{'/patient/medications/' + ${med.id} + '/edit'}"
                   class="btn btn-outline-primary btn-sm">Edit</a>
                <form th:action="@{'/patient/medications/' + ${med.id} + '/toggle'}"
                      method="post" style="display: inline;">
                  <button type="submit" class="btn btn-outline-warning btn-sm">
                    <span th:if="${med.active}">Deactivate</span>
                    <span th:unless="${med.active}">Activate</span>
                  </button>
                </form>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</body>
</html>
