<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Available Slots</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4">
  <h3 th:text="'Available Slots for Dr. ' + ${doctor.user.firstname} + ' ' + ${doctor.user.lastName}"></h3>

  <form method="get" th:action="@{|/appointments/${doctor.id}/slots|}" class="d-flex mb-3">
    <input type="date" class="form-control me-2" name="date" th:value="${selectedDate}">
    <button class="btn btn-secondary">View</button>
  </form>

  <div th:if="${#lists.isEmpty(availableSlots)}" class="alert alert-info">
    No available slots on this date.
  </div>

  <div class="row" th:if="${!#lists.isEmpty(availableSlots)}">
    <div class="col-md-6">
      <form th:action="@{/appointments/book}" method="post">
        <input type="hidden" name="doctorId" th:value="${doctor.id}"/>

        <div class="mb-3">
          <label class="form-label">Select Slot</label>
          <select name="slot" class="form-select" required>
            <option th:each="s : ${availableSlots}" th:value="${s}"
                    th:text="${#dates.format(s, 'yyyy-MM-dd HH:mm')}"></option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Reason</label>
          <input type="text" name="reason" class="form-control" required/>
        </div>

        <button type="submit" class="btn btn-success">Book Appointment</button>
        <a th:href="@{/appointments/doctors}" class="btn btn-secondary">Back</a>
      </form>
    </div>
  </div>
</div>
</body>
</html>
