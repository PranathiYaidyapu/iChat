<form th:action="@{/admin/add-user}" th:object="${user}" method="post" class="mt-3">
    <input type="text" th:field="*{username}" placeholder="Username" class="form-control mb-2" required/>
    <input type="password" th:field="*{password}" placeholder="Password" class="form-control mb-2" required/>

    <select th:field="*{role}" class="form-select mb-2" id="role" required>
        <option value="patient">Patient</option>
        <option value="doctor">Doctor</option>
        <option value="admin">Admin</option>
    </select>


    <div id="doctor-fields" style="display:none;">

        <label class="form-label">Specialization</label>
        <select name="specialization" class="form-select mb-2">
            <option value="">-- Select Specialization --</option>
            <option value="Cardiology">Cardiology</option>
            <option value="Dermatology">Dermatology</option>
            <option value="Neurology">Neurology</option>
            <option value="Orthopedics">Orthopedics</option>
            <option value="Pediatrics">Pediatrics</option>
            <option value="General Medicine">General Medicine</option>
            <option value="Psychiatry">Psychiatry</option>
        </select>

        <label class="form-label">Designation</label>
        <select name="designation" class="form-select mb-2">
            <option value="">-- Select Designation --</option>
            <option value="Consultant">Consultant</option>
            <option value="Senior Consultant">Senior Consultant</option>
            <option value="Resident Doctor">Resident Doctor</option>
            <option value="Chief Surgeon">Chief Surgeon</option>
            <option value="Specialist">Specialist</option>
        </select>
    </div>


    <button type="submit" class="btn btn-success">Add User</button>
</form>

<script>
    document.getElementById('role').addEventListener('change', function() {
        document.getElementById('doctor-fields').style.display = this.value === 'doctor' ? 'block' : 'none';
    });


</script>
