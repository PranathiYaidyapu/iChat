<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Edit Thread</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<div class="container mt-4">
  <nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a th:href="@{/community}">Community</a></li>
      <li class="breadcrumb-item"><a th:href="@{|/community/${thread.id}|}" th:text="${thread.title}">Thread</a></li>
      <li class="breadcrumb-item active">Edit</li>
    </ol>
  </nav>

  <div class="card">
    <div class="card-header bg-warning text-white">
      <h4 class="mb-0"><i class="fas fa-edit me-2"></i>Edit Thread</h4>
    </div>
    <div class="card-body">
      <!-- Error message display -->
      <div th:if="${param.error != null}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-triangle me-2"></i>
        <span th:text="${param.error}">Error message</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>

      <form th:action="@{|/community/${thread.id}/edit|}" method="post">
        <div class="mb-3">
          <label for="title" class="form-label">Title</label>
          <input type="text" id="title" name="title" class="form-control form-control-lg"
                 th:value="${thread.title}" required placeholder="Enter thread title"/>
        </div>
        <div class="mb-3">
          <label for="content" class="form-label">Content</label>
          <textarea id="content" name="content" rows="10" class="form-control" required
                    placeholder="Write your content here..." th:text="${thread.content}"></textarea>
          <div class="form-text">
            <i class="fas fa-info-circle me-1"></i>
            You can use markdown formatting in your content.
          </div>
        </div>
        <div class="d-flex justify-content-between">
          <div>
            <button type="submit" class="btn btn-warning">
              <i class="fas fa-save me-2"></i>Update Thread
            </button>
            <a th:href="@{|/community/${thread.id}|}" class="btn btn-secondary">
              <i class="fas fa-times me-2"></i>Cancel
            </a>
          </div>
          <button type="button" class="btn btn-outline-danger" data-bs-toggle="modal"
                  data-bs-target="#deleteModal">
            <i class="fas fa-trash me-2"></i>Delete Thread
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title"><i class="fas fa-exclamation-triangle me-2"></i>Confirm Deletion</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete this thread?</p>
        <p class="text-danger fw-bold">This action cannot be undone. All replies will also be deleted.</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <form th:action="@{|/community/${thread.id}/delete|}" method="post" class="d-inline">
          <button type="submit" class="btn btn-danger">
            <i class="fas fa-trash me-2"></i>Delete Thread
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
