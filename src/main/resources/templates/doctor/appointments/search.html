<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Search Appointments</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">Search Appointments</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link text-light" th:href="@{/doctor/appointments}">
            <i class="bi bi-arrow-left"></i> Back to Appointments
          </a>
        </li>
        <li class="nav-item">
          <a class="btn btn-danger" href="/logout">Logout</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h2>Search Appointments</h2>

  <!-- Search Form -->
  <div class="card mb-4">
    <div class="card-body">
      <form th:action="@{/doctor/appointments/search}" method="get" class="row g-3">
        <div class="col-md-6">
          <label for="patientName" class="form-label">Search by Patient Name</label>
          <input type="text" class="form-control" id="patientName" name="patientName"
                 th:value="${patientName}" placeholder="Enter patient name...">
        </div>
        <div class="col-md-6">
          <label for="date" class="form-label">Search by Date</label>
          <input type="date" class="form-control" id="date" name="date"
                 th:value="${date}">
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-search"></i> Search
          </button>
          <a th:href="@{/doctor/appointments/search}" class="btn btn-secondary">
            Clear
          </a>
        </div>
      </form>
    </div>
  </div>

  <!-- Search Results -->
  <div th:if="${appointments != null}">
    <h4>Search Results</h4>
    <div th:if="${#lists.isEmpty(appointments)}" class="alert alert-info">
      No appointments found matching your search criteria.
    </div>

    <div th:each="appointment : ${appointments}" class="card mb-3">
      <div class="card-body">
        <div class="row">
          <div class="col-md-8">
            <h5 class="card-title">
              <span th:text="${appointment.patient.firstname + ' ' + appointment.patient.lastName}"></span>
            </h5>
            <p class="card-text mb-1">
              <i class="bi bi-calendar"></i>
              <span th:text="${#temporals.format(appointment.startTime, 'EEE, MMM dd, yyyy')}"></span>
            </p>
            <p class="card-text mb-1">
              <i class="bi bi-clock"></i>
              <span th:text="${#temporals.format(appointment.startTime, 'hh:mm a') + ' - ' + #temporals.format(appointment.endTime, 'hh:mm a')}"></span>
            </p>
            <p class="card-text text-muted mb-1" th:if="${appointment.reason}">
              <i class="bi bi-chat-text"></i> <span th:text="${appointment.reason}"></span>
            </p>
          </div>
          <div class="col-md-4 text-end">
                        <span th:classappend="${appointment.status == 'SCHEDULED'} ? 'bg-primary' :
                                              ${appointment.status == 'COMPLETED'} ? 'bg-success' : 'bg-danger'"
                              class="badge" th:text="${appointment.status}"></span>
            <div class="mt-2">
              <a th:href="@{/doctor/appointments/{id}(id=${appointment.id})}"
                 class="btn btn-sm btn-outline-primary">
                <i class="bi bi-eye"></i> View Details
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
