<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Available Doctors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-4">Available Doctors</h2>

    <div class="row" th:if="${#lists.isEmpty(doctors)}">
        <p>No doctors are available right now.</p>
    </div>

    <div class="row" th:if="${!#lists.isEmpty(doctors)}">
        <div class="col-md-4 mb-3" th:each="doctor : ${doctors}">
            <div class="card">
                <div class="card-body">
                    <h5 th:text="${doctor.user.firstname} + ' ' + ${doctor.user.lastName}"></h5>
                    <p hidden><strong>Specialization:</strong> <span th:text="${doctor.specialization}"></span></p>
                    <p><strong>Designation:</strong> <span th:text="${doctor.designation}"></span></p>

                    <a th:href="@{'/appointments/book/' + ${doctor.id}}" class="btn btn-primary btn-sm">Book Appointment</a>
                </div>
            </div>
        </div>
    </div>

    <a href="/home" class="btn btn-secondary mt-3">Back to Home</a>
</div>
</body>
</html>
