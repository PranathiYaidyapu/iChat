<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Appointment Calendar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    .calendar-day {
      height: 120px;
      border: 1px solid #dee2e6;
      padding: 5px;
      position: relative;
    }
    .calendar-day.other-month {
      background-color: #f8f9fa;
      color: #6c757d;
    }
    .calendar-day.today {
      background-color: #e7f3ff;
      border: 2px solid #0d6efd;
    }
    .appointment-badge {
      font-size: 0.7em;
      margin: 1px;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .calendar-header {
      background-color: #0d6efd;
      color: white;
    }
  </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">iChat</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/patient/dashboard}">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/patient/calendar}">Calendar</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/patient/medications}">Medications</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/logout}">Logout</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <!-- Calendar Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Appointment Calendar</h2>
    <div>
      <a th:href="@{/patient/appointment/new}" class="btn btn-primary">
        <i class="bi bi-plus-circle"></i> New Appointment
      </a>
      <a th:href="@{/appointments}" class="btn btn-outline-secondary ms-2">
        List View
      </a>
    </div>
  </div>

  <!-- Month Navigation -->
  <div class="card mb-4">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center">
        <a th:href="@{/patient/calendar(year=${prevMonth.year}, month=${prevMonth.monthValue})}"
           class="btn btn-outline-primary">
          <i class="bi bi-chevron-left"></i> Previous
        </a>

        <h4 class="mb-0" th:text="${yearMonth.toString()}"></h4>

        <a th:href="@{/patient/calendar(year=${nextMonth.year}, month=${nextMonth.monthValue})}"
           class="btn btn-outline-primary">
          Next <i class="bi bi-chevron-right"></i>
        </a>
      </div>
    </div>
  </div>

  <!-- Calendar Grid -->
  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-bordered mb-0">
          <thead class="calendar-header">
          <tr>
            <th class="text-center">Sun</th>
            <th class="text-center">Mon</th>
            <th class="text-center">Tue</th>
            <th class="text-center">Wed</th>
            <th class="text-center">Thu</th>
            <th class="text-center">Fri</th>
            <th class="text-center">Sat</th>
          </tr>
          </thead>
          <tbody>
          <!-- Iterate through weeks -->
          <tr th:each="week : ${calendarWeeks}">
            <!-- Iterate through days in each week -->
            <td th:each="day : ${week}"
                th:classappend="'calendar-day ' +
                                    (${day.monthValue != currentMonth} ? 'other-month' : '') +
                                    (${day.equals(T(java.time.LocalDate).now())} ? ' today' : '')"
                class="calendar-day">
              <strong th:text="${day.dayOfMonth}"></strong>

              <!-- Show appointments for this day -->
              <div th:each="appointment : ${monthlyAppointments}">
                <th:block th:if="${#temporals.day(appointment.startTime) == day.dayOfMonth and
                                                      #temporals.month(appointment.startTime) == currentMonth and
                                                      #temporals.year(appointment.startTime) == currentYear}">
                                        <span class="badge appointment-badge bg-primary"
                                              th:title="${appointment.doctor.user.firstname} + ' ' + ${appointment.doctor.user.lastName} + ' - ' + ${#temporals.format(appointment.startTime, 'HH:mm')}">
                                            <i class="bi bi-clock"></i>
                                            <span th:text="${#temporals.format(appointment.startTime, 'HH:mm')}"></span>
                                            <br>
                                            <small th:text="${appointment.doctor.user.firstname}"></small>
                                        </span>
                </th:block>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Legend -->
  <div class="card mt-3">
    <div class="card-body">
      <div class="row">
        <div class="col-md-6">
          <h6>Legend:</h6>
          <span class="badge bg-primary me-2"><i class="bi bi-clock"></i> Appointment</span>
          <span class="border border-primary p-1 me-2">Today</span>
          <span class="text-muted">Gray = Other Month</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Upcoming Appointments -->
  <div class="card mt-4">
    <div class="card-header">
      <h5 class="mb-0">Upcoming Appointments This Month</h5>
    </div>

    <div class="card-body">

      <!-- Show this only when empty -->
      <div th:if="${monthlyAppointments == null or monthlyAppointments.isEmpty()}"
           class="alert alert-info">
        No appointments scheduled for this month.
      </div>

      <!-- Show appointments only when not empty -->
      <div th:if="${monthlyAppointments != null and !monthlyAppointments.isEmpty()}"
           class="list-group">

        <!-- Exclude CANCELLED -->
        <div th:each="appointment : ${monthlyAppointments}"
             th:if="${appointment.status != 'CANCELLED'}"
             class="list-group-item">

          <div class="d-flex justify-content-between align-items-center">

            <div>
              <h6 class="mb-1"
                  th:text="'Dr. ' + ${appointment.doctor.user.firstname} + ' ' + ${appointment.doctor.user.lastName}">
              </h6>

              <p class="mb-1 text-muted" th:text="${appointment.reason}"></p>

              <!-- Correct date + time formatting -->
              <small th:text="${#temporals.format(appointment.appointmentDate, 'EEEE, MMM d, yyyy')}
                     + ' at ' +
                     ${#temporals.format(appointment.startTime, 'HH:mm')}">
              </small>
            </div>

            <!-- Status Badge -->
            <span th:classappend="${
                appointment.status == 'SCHEDULED' ? 'badge bg-success' :
                (appointment.status == 'COMPLETED' ? 'badge bg-secondary' : 'badge bg-warning')
              }"
                  th:text="${appointment.status}">
          </span>

          </div>

        </div>

      </div>

    </div>
  </div>

</div>
</body>
</html>
