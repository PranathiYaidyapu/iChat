<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/patient/dashboard}">
            <i class="bi bi-heart-pulse me-1"></i>iChat
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/patient/dashboard}">
                        <i class="bi bi-house-door me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/patient/appointment/new}">
                        <i class="bi bi-calendar-plus me-1"></i>Book Appointment
                    </a>
                </li>
                <!-- Community in Primary Nav -->
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/community}">
                        <i class="bi bi-people-fill me-1"></i>Community
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <!-- Profile Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="profileDropdown" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle me-1"></i>
                        <span th:text="${doctor.user.firstname}"></span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
                        <li class="dropdown-header">Health Profile</li>
                        <li><a class="dropdown-item" th:href="@{/patient/profile/demographics}"><i class="bi bi-person-vcard me-2"></i>Demographics</a></li>
                        <li><a class="dropdown-item" th:href="@{/patient/profile/medical-history}"><i class="bi bi-clipboard2-pulse me-2"></i>Medical History</a></li>
                        <li><a class="dropdown-item" th:href="@{/patient/profile/view}"><i class="bi bi-eye me-2"></i>View Profile</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-body">
            <h3 class="card-title text-center mb-4">Book Appointment with
                <span th:text="${doctor.user.firstname} + ' ' + ${doctor.user.lastName}"></span>
            </h3>
            <p class="text-center text-muted" th:text="'Specialization: ' + ${doctor.specialization}"></p>

            <form th:action="@{/appointments/book}" method="post" class="mt-4">
                <input type="hidden" name="doctorId" th:value="${doctor.id}" />

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="date" class="form-label">Select Date</label>
                        <input type="date" class="form-control" id="date" name="date" required min="{{today}}">
                    </div>
                    <div class="col-md-6">
                        <label for="time" class="form-label">Select Time</label>
                        <select id="time" name="time" class="form-select" required>
                            <option value="">-- Select a Time Slot --</option>
                            <option value="09:00">09:00 AM</option>
                            <option value="10:00">10:00 AM</option>
                            <option value="11:00">11:00 AM</option>
                            <option value="14:00">02:00 PM</option>
                            <option value="15:00">03:00 PM</option>
                            <option value="16:00">04:00 PM</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="reason" class="form-label">Reason for Appointment</label>
                    <textarea id="reason" name="reason" rows="3" class="form-control" placeholder="Describe your symptoms or reason..." required></textarea>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-success px-4">Confirm Appointment</button>
                    <a th:href="@{/home}" class="btn btn-secondary ms-2 px-4">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Auto-set minimum date as today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date').setAttribute('min', today);
</script>

</body>
</html>
