<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Doctor Schedule</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/doctor/dashboard}">Dashboard</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="btn btn-danger" href="/logout">Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h3>Your Weekly Schedule</h3>
    <a class="btn btn-primary mb-3" th:href="@{/doctor/schedule/new}">Add Schedule</a>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Day</th>
            <th>Start</th>
            <th>End</th>
            <th>Break Start</th>
            <th>Break End</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="s : ${schedules}">
            <td th:text="${s.dayOfWeek}">DAY</td>
            <td th:text="${s.startTime}">09:00</td>
            <td th:text="${s.endTime}">12:00</td>
            <td th:text="${s.breakStart}">10:30</td>
            <td th:text="${s.breakEnd}">11:00</td>
            <td>
                <form th:action="@{|/doctor/schedule/${s.id}/delete|}" method="post">
                    <button class="btn btn-sm btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
