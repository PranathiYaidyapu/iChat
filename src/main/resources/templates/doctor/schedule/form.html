<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Add Schedule</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">Dashboard</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="btn btn-danger" href="/logout">Logout</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<div class="container mt-4">
  <h3>Add Schedule</h3>
  <form th:action="@{/doctor/schedule}" th:object="${schedule}" method="post">
    <div class="mb-3">
      <label>Day of Week</label>
      <select class="form-select" th:field="*{dayOfWeek}" required>
        <option th:each="d : ${days}" th:value="${d}" th:text="${d}">Monday</option>
      </select>
    </div>
    <div class="mb-3">
      <label>Start Time</label>
      <input type="time" class="form-control" th:field="*{startTime}" required/>
    </div>
    <div class="mb-3">
      <label>End Time</label>
      <input type="time" class="form-control" th:field="*{endTime}" required/>
    </div>
    <div class="mb-3">
      <label>Break Start</label>
      <input type="time" class="form-control" th:field="*{breakStart}"/>
    </div>
    <div class="mb-3">
      <label>Break End</label>
      <input type="time" class="form-control" th:field="*{breakEnd}"/>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
    <a th:href="@{/doctor/schedule}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
</body>
</html>
