<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Choose Doctor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4">
    <h3>Select a Doctor</h3>
    <table class="table table-hover">
        <thead><tr><th>Name</th><th>Specialization</th><th>Action</th></tr></thead>
        <tbody>
        <tr th:each="d : ${doctors}">
            <td th:text="${d.user.firstname + ' ' + d.user.lastName}">Dr Name</td>
            <td th:text="${d.specialization}">Spec</td>
            <td><a class="btn btn-primary btn-sm" th:href="@{|/appointments/${d.id}/slots|}">View Slots</a></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
