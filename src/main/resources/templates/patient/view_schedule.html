<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Doctor Schedule</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4">
    <h3 th:text="'Dr. ' + ${doctor.user.firstname} + ' ' + ${doctor.user.lastName} + ' - Schedule'"></h3>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Day</th>
            <th>Start</th>
            <th>End</th>
            <th>Break</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="s : ${schedules}">
            <td th:text="${s.dayOfWeek}"></td>
            <td th:text="${s.startTime}"></td>
            <td th:text="${s.endTime}"></td>
            <td th:text="${s.breakStart} + ' - ' + ${s.breakEnd}"></td>
        </tr>
        </tbody>
    </table>

    <a class="btn btn-secondary" th:href="@{/patient/dashboard}">Back</a>
</div>
</body>
</html>
