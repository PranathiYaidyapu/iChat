<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>New Thread</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4">
    <h3>Create Thread</h3>

    <!-- Error message display -->
    <div  th:if="${error != null}"
         class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}">Error message</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <form th:action="@{/community}" method="post">
        <div class="mb-3">
            <input type="text" name="title"
                   th:value="${title != null ? title : ''}"
                   placeholder="Title" class="form-control" required/>
        </div>
        <div class="mb-3">
            <textarea name="content" rows="6" class="form-control"
                      placeholder="Write something..." required
                      th:text="${content != null ? content : ''}"></textarea>
        </div>
        <button class="btn btn-success">Post</button>
        <a th:href="@{/community}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

<!-- Add Bootstrap JS for alert dismiss -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
