<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>My Medications</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">iChat</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/patient/dashboard}">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/patient/medications}">Medications</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/logout}">Logout</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>My Medications</h2>
    <div>
      <a th:href="@{/patient/medications/new}" class="btn btn-primary me-2">
        <i class="bi bi-plus-circle"></i> Add Medication
      </a>
      <a th:href="@{/patient/medications/all}" class="btn btn-outline-secondary">
        View All
      </a>
    </div>
  </div>

  <div th:if="${medications != null and medications.empty}" class="alert alert-info">
    <h5>No Active Medications</h5>
    <p>You don't have any active medications. Click "Add Medication" to get started.</p>
  </div>

  <div th:if="${medications != null and !medications.empty}" class="row">
    <div class="col-md-6 mb-3" th:each="med : ${medications}">
      <div class="card h-100" th:classappend="${med.active} ? 'border-success' : 'border-secondary'">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start">
            <h5 class="card-title" th:text="${med.medicationName}"></h5>
            <span th:if="${med.reminderEnabled}" class="badge bg-warning">
                            <i class="bi bi-bell"></i> Reminder
                        </span>
          </div>

          <p class="card-text">
            <strong>Dosage:</strong> <span th:text="${med.dosage}"></span><br>
            <strong>Frequency:</strong> <span th:text="${med.frequency}"></span><br>
            <th:block th:if="${med.instructions != null and !med.instructions.isEmpty()}">
              <strong>Instructions:</strong> <span th:text="${med.instructions}"></span><br>
            </th:block>
            <th:block th:if="${med.startDate != null}">
              <strong>Start:</strong> <span th:text="${#temporals.format(med.startDate, 'yyyy-MM-dd')}"></span><br>
            </th:block>
            <th:block th:if="${med.endDate != null}">
              <strong>End:</strong> <span th:text="${#temporals.format(med.endDate, 'yyyy-MM-dd')}"></span><br>
            </th:block>
            <!-- Fixed this line - proper null check for reminderTime -->
            <th:block th:if="${med.reminderEnabled and med.reminderTime != null}">
              <strong>Reminder:</strong> <span th:text="${#temporals.format(med.reminderTime, 'HH:mm')}"></span><br>
            </th:block>
          </p>
        </div>
        <div class="card-footer">
          <div class="btn-group btn-group-sm" role="group">
            <a th:href="@{'/patient/medications/' + ${med.id} + '/edit'}"
               class="btn btn-outline-primary">Edit</a>
            <form th:action="@{'/patient/medications/' + ${med.id} + '/toggle'}"
                  method="post" style="display: inline;">
              <button type="submit" class="btn btn-outline-warning">
                <span th:if="${med.active}">Deactivate</span>
                <span th:unless="${med.active}">Activate</span>
              </button>
            </form>
            <form th:action="@{'/patient/medications/' + ${med.id} + '/delete'}"
                  method="post" style="display: inline;">
              <button type="submit" class="btn btn-outline-danger"
                      onclick="return confirm('Are you sure you want to delete this medication?')">
                Delete
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
