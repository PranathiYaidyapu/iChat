<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .login-container {
            max-width: 400px;
            margin-top: 80px;
            padding: 30px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #4e73df;
        }
        .btn-login {
            background-color: #4e73df;
            color: white;
        }
        .btn-login:hover {
            background-color: #2e59d9;
            color: white;
        }
        .links a {
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="login-container">
        <h3 class="text-center mb-4">Login to iChat</h3>
        <form th:action="@{/login}" method="post">
            <!-- Role selection -->
            <div class="mb-3">
                <label for="role" class="form-label">Login as</label>
                <select class="form-select" name="role" id="role" required>
                    <option value="" disabled selected>Select role</option>
                    <option value="role_patient">Patient</option>
                    <option value="role_doctor">Doctor/Therapist</option>
                    <option value="role_admin">Admin</option>
                </select>
            </div>

            <!-- Username -->
            <div class="mb-3">
                <label for="username" class="form-label">Email</label>
                <input type="email" class="form-control" name="username" id="username" placeholder="Enter email" required>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" name="password" id="password" placeholder="Enter password" required>
            </div>

            <!-- Submit -->
            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-login">Login</button>
            </div>
            <div th:if="${error}" class="text-danger mt-2">
                <span th:text="${error}"></span>
            </div>

            <!-- Links -->
            <div class="d-flex justify-content-between links">
                <a th:href="@{/register}">Register</a>
                <a th:href="@{/forgot-password}">Forgot Password?</a>
            </div>

            <!-- Error message -->
            <div th:if="${param.error}" class="text-danger mt-2">
                Invalid username, password, or role.
            </div>
            <div th:if="${param.logout}" class="text-success mt-2">
                You have been logged out successfully.
            </div>
        </form>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
